name: Build .so on CentOS 7 (glibc 2.17)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in CentOS 7 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            centos:7 \
            bash -c '
              set -e

              # 修复 yum 源
              sed -i "s/mirrorlist/#mirrorlist/g" /etc/yum.repos.d/CentOS-*.repo
              sed -i "s|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo
              yum clean all && yum makecache

              # 安装编译工具
              yum install -y gcc make git

              # 安装 Go 1.21.13（手动下载）
              curl -fsSL https://go.dev/dl/go1.21.13.linux-amd64.tar.gz -o go.tar.gz
              tar -C /usr/local -xzf go.tar.gz
              export PATH=/usr/local/go/bin:$PATH

              # 禁止自动下载更高版本 Go
              export GOTOOLCHAIN=local
              go version

              # 进入 agent 主目录
              cd /workspace/cmd/agent

              # 跳过 go mod tidy，直接编译
              CGO_ENABLED=1 go build -buildmode=c-shared -o /workspace/v1-amd64.so .

              echo "===== glibc 依赖检查 ====="
              ldd /workspace/v1-amd64.so

              echo "===== 导出函数 ====="
              nm -D /workspace/v1-amd64.so | grep -E "Start|Stop" || true
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v1-amd64-glibc217
          path: v1-amd64.so
