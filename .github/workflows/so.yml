name: Build .so on CentOS 7 (glibc 2.17)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 在宿主机（ubuntu-latest）检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 使用 CentOS 7 容器编译
      - name: Build in CentOS 7
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            centos:7 \
            bash -c "
              # 修复 yum 源
              sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo
              sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
              yum clean all && yum makecache

              # 安装基础工具和 GCC
              yum install -y gcc make git

              # 手动安装新版 Go（避免 yum 里的旧版本）
              curl -fsSL https://go.dev/dl/go1.21.13.linux-amd64.tar.gz -o go.tar.gz
              tar -C /usr/local -xzf go.tar.gz
              export PATH=/usr/local/go/bin:\$PATH
              go version

              # 编译为 .so
              CGO_ENABLED=1 go build -buildmode=c-shared -o v1-amd64.so .
              ldd v1-amd64.so
              nm -D v1-amd64.so | grep -E 'Start|Stop'
            "

      # 3. 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v1-amd64-glibc217
          path: v1-amd64.so
